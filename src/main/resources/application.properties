spring.application.name=voting-system

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username="Your email"
spring.mail.password="Your Password"
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/voting_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username="Your Username"
spring.datasource.password="Your Database password"
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Disable DevTools restart for resource file changes to prevent toggle reset
spring.devtools.restart.exclude=**/*.csv,static/**,public/**,templates/**
